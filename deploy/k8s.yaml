apiVersion: apps/v1
kind: Deployment
metadata: { name: probesite, labels: { app: probesite } }
spec:
  replicas: 1
  selector: { matchLabels: { app: probesite } }
  template:
    metadata: { labels: { app: probesite } }
    spec:
      containers:
        - name: probesite
          image: ghcr.io/cognis-digital/probesite:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: probesite }
spec:
  selector: { app: probesite }
  ports: [{ port: 80, targetPort: 8000 }]
